name: flutter_stitch_app
description: A premium fine-dining Flutter web experience for "4 to 8" eatery — featuring cinematic parallax animations, Stitch-audited typography, and Cloud Run deployment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.2.0
  file_picker: ^8.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
